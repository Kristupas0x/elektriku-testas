<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elektrikų Testas (Egzamino režimas)</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --container-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --primary: #007aff;
            --primary-hover: #005bb5;
            --success: #34c759;
            --danger: #ff3b30;
            --border: #d2d2d7;
            --selected: #e1f0ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--container-bg);
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            box-sizing: border-box;
        }

        .layout {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .layout { flex-direction: column-reverse; }
        }

        .main-content { flex: 3; }
        .sidebar { flex: 1; min-width: 200px; }

        h1, h2 { margin-top: 0; text-align: center; }
        .screen { display: none; }
        .screen.active { display: block; }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .nav-item {
            background-color: #f0f0f5;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 10px 0;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }

        .nav-item.current { border-color: var(--primary); }
        .nav-item.answered { background-color: var(--primary); color: white; }
        .nav-item.correct { background-color: var(--success); color: white; }
        .nav-item.wrong { background-color: var(--danger); color: white; }

        button {
            appearance: none;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover:not(:disabled) { background-color: var(--primary-hover); }
        button:disabled { background-color: var(--border); cursor: not-allowed; color: var(--text-muted); }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            gap: 10px;
        }

        .submit-btn { background-color: #ff9500; width: 100%; margin-top: 15px; }
        .submit-btn:hover { background-color: #e08500; }

        .option-btn {
            background-color: #fff;
            color: var(--text-main);
            border: 1px solid var(--border);
            text-align: left;
            margin-top: 10px;
            font-weight: 400;
            width: 100%;
            border-radius: 10px;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) { background-color: #f5f5f7; }
        .option-btn.selected { background-color: var(--selected); border-color: var(--primary); font-weight: 500; }
        .option-btn.correct { background-color: var(--success); color: white; border-color: var(--success); }
        .option-btn.wrong { background-color: var(--danger); color: white; border-color: var(--danger); }
        
        .multi-hint {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 15px;
            display: none;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .progress-container { width: 100%; background-color: var(--border); border-radius: 4px; height: 6px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background-color: var(--primary); width: 0%; transition: width 0.3s; }

        .question-img {
            display: none;
            max-width: 100%;
            max-height: 280px;
            margin: 0 auto 20px auto;
            border-radius: 8px;
            border: 1px solid var(--border);
            object-fit: contain;
        }

        #question-text { font-size: 18px; font-weight: 600; margin-bottom: 5px; line-height: 1.4; }
        .result-circle { width: 120px; height: 120px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: bold; margin: 20px auto; color: white; }
        .pass { background-color: var(--success); }
        .fail { background-color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="screen active">
        <h1>Elektrikų Egzaminas</h1>
        <p style="text-align: center; color: var(--text-muted); max-width: 500px; margin: 20px auto;">
            Kraunami klausimai iš duomenų bazės...
        </p>
        <div style="text-align: center; font-weight: 600; margin-bottom: 30px;">Riba: 80% | Laikas: 30 min.</div>
        <button id="start-btn" style="width: 100%; padding: 16px;" onclick="startTest()" disabled>Prašome palaukti...</button>
    </div>

    <div id="test-screen" class="screen">
        <div class="header-stats">
            <span id="test-mode-title">Egzaminas vykdymui</span>
            <span id="timer" style="color: var(--danger);">30:00</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div class="layout">
            <div class="main-content">
                <img id="question-image" class="question-img" src="" alt="Schema">
                <div id="question-text">Kraunasi klausimas...</div>
                <div id="multi-hint" class="multi-hint">(Galimi keli teisingi atsakymai)</div>
                <div id="options-container"></div>
                
                <div class="nav-controls">
                    <button id="prev-btn" onclick="prevQuestion()">← Atgal</button>
                    <button id="next-btn" onclick="nextQuestion()">Pirmyn →</button>
                </div>
            </div>

            <div class="sidebar">
                <div style="font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted);">Klausimų sąrašas:</div>
                <div id="nav-grid" class="nav-grid"></div>
                <button id="submit-exam-btn" class="submit-btn" onclick="handleSidebarClick()">Baigti testą</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2>Egzamino Rezultatas</h2>
        <div id="result-circle" class="result-circle">0%</div>
        <h3 id="result-message" style="text-align: center;"></h3>
        <p style="text-align: center; color: var(--text-muted);" id="result-details"></p>
        <div style="display: flex; gap: 15px; margin-top: 30px;">
            <button style="flex: 1; background-color: #5856d6;" onclick="enterReviewMode()">Peržiūrėti klaidas</button>
            <button style="flex: 1;" onclick="resetTest()">Bandyti iš naujo</button>
        </div>
    </div>
</div>

<script>
    let visiKlausimai = [];
    let testKlausimai = [];
    let pasirinktiAtsakymai = [];
    let dabartinisIndeksas = 0;
    let laikasLiko = 1800;
    let laikmacioIntervalas;
    let isBaigta = false;
    const klausimuSkaiciusTeste = 30;

    // Užkrauname klausimus iš JSON failo vos tik atsidarius puslapiui
    document.addEventListener("DOMContentLoaded", () => {
        fetch('klausimai.json')
            .then(response => {
                if (!response.ok) throw new Error("Nepavyko užkrauti klausimų failo");
                return response.json();
            })
            .then(data => {
                visiKlausimai = data;
                let startBtn = document.getElementById('start-btn');
                startBtn.disabled = false;
                startBtn.innerText = "Pradėti testą";
                document.querySelector('#start-screen p').innerText = `Sistemoje rasta klausimų: ${visiKlausimai.length}. Testui bus parinkta iki ${klausimuSkaiciusTeste} atsitiktinių klausimų.`;
            })
            .catch(error => {
                console.error(error);
                let startBtn = document.getElementById('start-btn');
                startBtn.innerText = "Klaida užkraunant duomenis!";
                document.querySelector('#start-screen p').innerHTML = `<span style="color:red;">Klaida: ${error.message}. Įsitikinkite, kad naudojate vietinį serverį (Live Server) ir klausimai.json failas egzistuoja.</span>`;
            });
    });

    function startTest() {
        // Išmaišome ir atrenkame klausimus
        let sumaisytiKlausimai = [...visiKlausimai].sort(() => 0.5 - Math.random());
        let atrinkti = sumaisytiKlausimai.slice(0, Math.min(klausimuSkaiciusTeste, visiKlausimai.length));
        
        testKlausimai = [];
        
        atrinkti.forEach(q => {
            // Saugome originalius teisingus indeksus ir tekstus
            let variantai = q.atsakymai.map((ats, idx) => ({
                tekstas: ats,
                arTeisingas: q.teisingas.includes(idx)
            }));
            
            // Sumaišome atsakymų variantus
            variantai.sort(() => 0.5 - Math.random());
            
            // Surandame naujus indeksus teisingų atsakymų po sumaišymo
            let naujiTeisingi = variantai
                .map((v, i) => v.arTeisingas ? i : -1)
                .filter(i => i !== -1);
            
            testKlausimai.push({
                klausimas: q.klausimas,
                atsakymai: variantai.map(v => v.tekstas),
                teisingas: naujiTeisingi,
                vaizdas: q.vaizdas || "",
                tipas: q.tipas || "single"
            });
        });
        
        // Atstatome kintamuosius naujam testui. Kiekvienas elementas yra tuščias masyvas (nes gali būti keli pasirinkimai)
        pasirinktiAtsakymai = Array.from({ length: testKlausimai.length }, () => []);
        dabartinisIndeksas = 0;
        laikasLiko = 1800;
        isBaigta = false;
        
        document.getElementById('test-mode-title').innerText = "Egzaminas vykdymui";
        
        let submitBtn = document.getElementById('submit-exam-btn');
        submitBtn.innerText = "Baigti testą";
        submitBtn.style.backgroundColor = "#ff9500";
        submitBtn.style.display = 'block';
        
        document.getElementById('timer').style.display = 'inline';
        
        rodytiEkrana('test-screen');
        startTimer();
        rodytiKlausima();
    }

    function rodytiKlausima() {
        let q = testKlausimai[dabartinisIndeksas];
        document.getElementById('question-text').innerText = `${dabartinisIndeksas + 1}. ${q.klausimas}`;
        
        // Nuotraukų valdymas
        let img = document.getElementById('question-image');
        if (q.vaizdas && q.vaizdas.trim() !== "") {
            img.src = q.vaizdas;
            img.style.display = 'block';
        } else {
            img.style.display = 'none';
        }

        // Kelių atsakymų užuomina
        let hint = document.getElementById('multi-hint');
        hint.style.display = (q.tipas === 'multiple') ? 'block' : 'none';

        // Generuojame variantus
        let container = document.getElementById('options-container');
        container.innerHTML = '';
        
        let dabartiniaiPasirinkimai = pasirinktiAtsakymai[dabartinisIndeksas];

        q.atsakymai.forEach((ats, idx) => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            
            // Pridedame varnelę, jei tai multi-select, kad būtų vizualiai aiškiau
            let btnText = ats;
            if (q.tipas === 'multiple' && dabartiniaiPasirinkimai.includes(idx)) {
                btnText += ' ✓';
            }
            btn.innerText = btnText;

            if (isBaigta) {
                btn.disabled = true;
                // Jei šis variantas yra teisingų atsakymų sąraše:
                if (q.teisingas.includes(idx)) {
                    btn.classList.add('correct');
                }
                // Jei vartotojas jį pasirinko, bet jis neteisingas:
                else if (dabartiniaiPasirinkimai.includes(idx)) {
                    btn.classList.add('wrong');
                }
            } else {
                if (dabartiniaiPasirinkimai.includes(idx)) {
                    btn.classList.add('selected');
                }
                btn.onclick = () => pasirinktiAtsakyma(idx, q.tipas);
            }
            container.appendChild(btn);
        });

        document.getElementById('prev-btn').disabled = (dabartinisIndeksas === 0);
        document.getElementById('next-btn').disabled = (dabartinisIndeksas === testKlausimai.length - 1);

        atnaujintiMeniu();
        atnaujintiProgresa();
    }

    function pasirinktiAtsakyma(idx, tipas) {
        let esamiPasirinkimai = pasirinktiAtsakymai[dabartinisIndeksas];

        if (tipas === 'multiple') {
            if (esamiPasirinkimai.includes(idx)) {
                // Nuimame žymėjimą
                pasirinktiAtsakymai[dabartinisIndeksas] = esamiPasirinkimai.filter(i => i !== idx);
            } else {
                // Pridedame žymėjimą
                esamiPasirinkimai.push(idx);
            }
        } else {
            // Vieno pasirinkimo klausimas
            pasirinktiAtsakymai[dabartinisIndeksas] = [idx];
        }
        
        rodytiKlausima();
    }

    function nextQuestion() {
        if (dabartinisIndeksas < testKlausimai.length - 1) {
            dabartinisIndeksas++;
            rodytiKlausima();
        }
    }

    function prevQuestion() {
        if (dabartinisIndeksas > 0) {
            dabartinisIndeksas--;
            rodytiKlausima();
        }
    }

    // Patikrina ar du masyvai turi tuos pačius elementus
    function masyvaiVienodi(arr1, arr2) {
        if (arr1.length !== arr2.length) return false;
        let sorted1 = [...arr1].sort();
        let sorted2 = [...arr2].sort();
        return sorted1.every((val, index) => val === sorted2[index]);
    }

    function atnaujintiMeniu() {
        let grid = document.getElementById('nav-grid');
        grid.innerHTML = '';

        testKlausimai.forEach((q, idx) => {
            let item = document.createElement('div');
            item.className = 'nav-item';
            item.innerText = idx + 1;

            if (idx === dabartinisIndeksas) item.classList.add('current');

            if (isBaigta) {
                let vartotojo = pasirinktiAtsakymai[idx];
                let teisingi = q.teisingas;
                
                if (masyvaiVienodi(vartotojo, teisingi)) {
                    item.classList.add('correct');
                } else {
                    item.classList.add('wrong');
                }
            } else {
                if (pasirinktiAtsakymai[idx].length > 0) {
                    item.classList.add('answered');
                }
            }

            item.onclick = () => {
                dabartinisIndeksas = idx;
                rodytiKlausima();
            };
            grid.appendChild(item);
        });
    }

    function atnaujintiProgresa() {
        let atsakyti = pasirinktiAtsakymai.filter(a => a.length > 0).length;
        let proc = (atsakyti / testKlausimai.length) * 100;
        document.getElementById('progress-bar').style.width = proc + '%';
    }

    function startTimer() {
        clearInterval(laikmacioIntervalas);
        updateTimerText();
        laikmacioIntervalas = setInterval(() => {
            laikasLiko--;
            updateTimerText();
            if (laikasLiko <= 0) {
                clearInterval(laikmacioIntervalas);
                skaiciuotiRezultatus();
            }
        }, 1000);
    }

    function updateTimerText() {
        let min = Math.floor(laikasLiko / 60);
        let sec = laikasLiko % 60;
        document.getElementById('timer').innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    function handleSidebarClick() {
        if (isBaigta) {
            resetTest();
        } else {
            triggerSubmit();
        }
    }

    function triggerSubmit() {
        let neatsakyti = pasirinktiAtsakymai.filter(a => a.length === 0).length;
        let pranesimas = "Ar tikrai norite baigti egzaminą?";
        if (neatsakyti > 0) {
            pranesimas = `Jūs neatsakėte į ${neatsakyti} klausimų (-us)! Ar tikrai norite baigti egzaminą?`;
        }
        if (confirm(pranesimas)) {
            skaiciuotiRezultatus();
        }
    }

    function skaiciuotiRezultatus() {
        clearInterval(laikmacioIntervalas);
        isBaigta = true;

        let teisingi = 0;
        testKlausimai.forEach((q, idx) => {
            if (masyvaiVienodi(pasirinktiAtsakymai[idx], q.teisingas)) {
                teisingi++;
            }
        });

        let procentai = Math.round((teisingi / testKlausimai.length) * 100);
        
        let circle = document.getElementById('result-circle');
        circle.innerText = procentai + '%';
        
        let msg = document.getElementById('result-message');
        if (procentai >= 80) {
            circle.className = "result-circle pass";
            msg.innerText = "Egzaminas IŠLAIKYTAS!";
        } else {
            circle.className = "result-circle fail";
            msg.innerText = "Egzaminas NEIŠLAIKYTAS.";
        }

        document.getElementById('result-details').innerText = `Teisingai atsakėte į ${teisingi} iš ${testKlausimai.length} klausimų.`;
        rodytiEkrana('result-screen');
    }

    function enterReviewMode() {
        document.getElementById('test-mode-title').innerText = "Klaidų peržiūra";
        
        let submitBtn = document.getElementById('submit-exam-btn');
        submitBtn.innerText = "Grįžti į pradžią";
        submitBtn.style.backgroundColor = "var(--primary)";
        submitBtn.style.display = 'block';
        
        document.getElementById('timer').style.display = 'none';
        dabartinisIndeksas = 0;
        rodytiEkrana('test-screen');
        rodytiKlausima();
    }

    function resetTest() {
        rodytiEkrana('start-screen');
    }

    function rodytiEkrana(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
